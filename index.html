<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We've Moved!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#e2e8f0;font-family:'General Sans',system-ui,-apple-system,sans-serif;padding:1.5rem}
.card{max-width:480px;width:100%;text-align:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2.5rem 2rem}
h1{font-size:1.6rem;font-weight:700;margin-bottom:.6rem;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#94a3b8;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
.new-name{color:#e2e8f0;font-weight:600}
a.btn{display:inline-block;padding:.75rem 2rem;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;text-decoration:none;border-radius:12px;font-weight:600;font-size:1rem;transition:opacity .2s}
a.btn:hover{opacity:.85}
.note{margin-top:1.5rem;font-size:.75rem;color:#64748b;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <h1>We've Moved!</h1>
  <p>This site has been rebranded to <span class="new-name">GMT Optimizer</span> and is now hosted at a new domain. Same tool, new name.</p>
  <a href="https://gmt-optimizer.com" class="btn">Go to gmt-optimizer.com</a>
  <div class="note">This redirect page will remain active for a limited time.<br>Please update your bookmarks.</div>
</div>
</body>
</html>
